name: Release Baseline Profile

# release/v* 브랜치로 PR 이 열리거나 갱신될 때 베이스라인 프로파일을 생성하고
# 변경 사항이 있으면 그 release 브랜치로 직접 commit / push back 한다.
# auto-release.yml 과 분리해서 머지 후 release 단계의 시간을 단축하고
# baseline 변경분이 PR diff 에 노출되어 리뷰될 수 있게 한다.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths-ignore:
      - 'app/src/main/generated/baselineProfiles/**'
      - 'docs/baseline-profile-report.md'

concurrency:
  group: release-baseline-profile-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  baseline:
    if: |
      github.event.pull_request.merged == false &&
      startsWith(github.event.pull_request.head.ref, 'release/v') &&
      github.event.pull_request.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Pre-install Android Emulator and system images
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "emulator" \
            "platform-tools" \
            "system-images;android-32;default;x86_64"

      - name: Prepare secrets.properties
        run: |
          cat > secrets.properties <<EOF
          YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
          EOF

      - name: Generate baseline profile
        run: |
          ./gradlew :app:generateBaselineProfile \
            -Pci \
            -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect \
            --no-configuration-cache

      - name: Generate baseline profile report
        run: |
          mkdir -p docs
          PROFILE="app/src/main/generated/baselineProfiles/baseline-prof.txt"
          if [ ! -f "$PROFILE" ]; then
            echo "Baseline profile not found at $PROFILE — skipping report"
            exit 0
          fi
          TOTAL=$(wc -l < "$PROFILE" | tr -d ' ')
          STARTUP=$(grep -cE '^HSP|^HS|^S' "$PROFILE" || true)
          INTERACTION=$((TOTAL - STARTUP))
          SIZE=$(du -h "$PROFILE" | cut -f1)

          {
            echo "# Baseline Profile Report"
            echo
            echo "**Generated**: $(date -u +"%Y-%m-%d %H:%M UTC")"
            echo "**Branch**: ${{ github.event.pull_request.head.ref }}"
            echo "**Device**: Pixel 6 API 32 (Gradle Managed Device, CI)"
            echo
            echo "## Summary"
            echo
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Total rules | $TOTAL |"
            echo "| Startup rules | $STARTUP |"
            echo "| Interaction rules | $INTERACTION |"
            echo "| File size | $SIZE |"
            echo
            echo "## Top 15 App Classes"
            echo
            echo "| Class | Rules |"
            echo "|---|---|"
            grep -oE 'Lcom/hancekim/billboard[^;]+;' "$PROFILE" \
              | sed 's|^L||;s|;$||;s|/|.|g;s|\$.*||' \
              | sort | uniq -c | sort -rn | head -15 \
              | awk '{$1=$1; printf "| %s | %s |\n", substr($0, index($0,$2)), $1}'
          } > docs/baseline-profile-report.md

      - name: Commit and push if changed
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/main/generated/baselineProfiles/ docs/baseline-profile-report.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No baseline profile changes — nothing to commit"
          else
            git commit -m "chore: baseline profile 자동 갱신 [skip ci]"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR
        if: steps.push.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('docs/baseline-profile-report.md', 'utf8');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 베이스라인 프로파일 갱신됨\n\n<details><summary>리포트</summary>\n\n${report}\n\n</details>`,
            });
