name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Pre-install Android Emulator and system images
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "emulator" \
            "platform-tools" \
            "system-images;android-32;default;x86_64"

      - name: Prepare keystore and local.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/release.jks
          cat > local.properties <<EOF
          sdk.dir=$ANDROID_HOME
          keystore.path=${{ github.workspace }}/release.jks
          keystore.password=$KEYSTORE_PASSWORD
          key.alias=$KEY_ALIAS
          key.password=$KEY_PASSWORD
          EOF

      - name: Prepare secrets.properties
        run: |
          cat > secrets.properties <<EOF
          YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
          EOF

      - name: Generate baseline profile
        run: |
          ./gradlew :app:generateDemoBaselineProfile \
            -Pci \
            -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect \
            --no-configuration-cache

      - name: Generate baseline profile report
        run: |
          mkdir -p docs
          PROFILE="app/src/main/generated/baselineProfiles/baseline-prof.txt"
          TOTAL=$(wc -l < "$PROFILE" | tr -d ' ')
          STARTUP=$(grep -c "^HSP\|^HS\|^S" "$PROFILE" || echo "0")
          INTERACTION=$((TOTAL - STARTUP))
          SIZE=$(du -h "$PROFILE" | cut -f1)

          cat > docs/baseline-profile-report.md <<REPORT
          # Baseline Profile Report

          **Generated**: $(date -u +"%Y-%m-%d %H:%M UTC")
          **Tag**: ${{ github.ref_name }}
          **Device**: Pixel 6 API 32 (Gradle Managed Device, CI)

          ## Summary

          | Metric | Value |
          |---|---|
          | Total rules | $TOTAL |
          | Startup rules | $STARTUP |
          | Interaction rules | $INTERACTION |
          | File size | $SIZE |

          ## Top 15 App Classes

          | Class | Rules |
          |---|---|
          $(grep -oE 'Lcom/hancekim/billboard[^;]+;' "$PROFILE" | sed 's|^L||;s|;$||;s|/|.|g;s|\$.*||' | sort | uniq -c | sort -rn | head -15 | awk '{printf "| %s | %s |\n", $2, $1}')
          REPORT

      - name: Commit profile and report to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add app/src/main/generated/baselineProfiles/ docs/baseline-profile-report.md
          if git diff --cached --quiet; then
            echo "No profile changes to commit"
          else
            git commit -m "baseline profile 갱신 (${{ github.ref_name }}) [skip ci]"
            git push origin main
          fi
          git checkout ${{ github.sha }}

      - name: Build prodRelease APK
        run: ./gradlew :app:assembleProdRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/prod/release/app-prod-release.apk \
             billboard-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: billboard-${{ github.ref_name }}.apk
          generate_release_notes: true
