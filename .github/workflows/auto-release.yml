name: Auto Release on Merge

# release/v* 브랜치가 main 으로 머지되면 자동으로 태그 push + APK 빌드 + GitHub Release 생성
# baseline profile 은 release-baseline-profile.yml 에서 PR 단계에 미리 커밋되므로
# 이 workflow 는 APK 빌드와 Release 발행만 담당한다 (slim).

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: '강제 릴리즈할 태그 (예: v1.1.1)'
        required: true
        type: string

jobs:
  release:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'release/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Compute tag and ref
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            REF="main"
          else
            BRANCH="${{ github.event.pull_request.head.ref }}"
            TAG="${BRANCH#release/}"
            REF="${{ github.event.pull_request.merge_commit_sha }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.ref }}
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.meta.outputs.tag }} already exists — skipping create"
          else
            git tag "${{ steps.meta.outputs.tag }}"
            git push origin "${{ steps.meta.outputs.tag }}"
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Prepare keystore and local.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/release.jks
          cat > local.properties <<EOF
          sdk.dir=$ANDROID_HOME
          keystore.path=${{ github.workspace }}/release.jks
          keystore.password=$KEYSTORE_PASSWORD
          key.alias=$KEY_ALIAS
          key.password=$KEY_PASSWORD
          EOF

      - name: Prepare secrets.properties
        run: |
          cat > secrets.properties <<EOF
          YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
          EOF

      - name: Build prodRelease APK
        run: ./gradlew :app:assembleProdRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/prod/release/app-prod-release.apk \
             billboard-${{ steps.meta.outputs.tag }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            billboard-${{ steps.meta.outputs.tag }}.apk
          generate_release_notes: true
